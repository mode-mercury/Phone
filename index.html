<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Updated Feature Set</title>
  <style>
    /* Styles for new menus */
    #menuBar {
      display: none; /* Hide old sidebar menu */
    }
    #fileMenu {
      margin: 20px;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
      padding: 10px;
    }
    #themeMenu {
      margin: 20px;
      border: 1px solid #ccc;
      background-color: #f9f9f9;
      padding: 10px;
    }
    .menuOption {
      cursor: pointer;
      padding: 5px;
      margin: 5px 0;
      display: block;
    }
  </style>
</head>
<body>
  <!-- File Operations Menu -->
  <nav id="fileMenu">
    <h2>File Menu</h2>
    <div class="menuOption" id="new">New Menu</div>
    <div class="menuOption" id="saveFile">Save File</div>
    <div class="menuOption" id="exit">Exit</div>
  </nav>

  <!-- Theme Options Menu -->
  <nav id="themeMenu">
    <h2>Theme and Appearance</h2>
    <div class="menuOption" id="themeSettings">Change Theme</div>
  </nav>

  <main id="mainContent">
    <h1>Welcome to Updated Interface</h1>
    <p>Refreshed layout includes updates to menus, session save behavior, and personalization options.</p>
  </main>
</body>
</html>
